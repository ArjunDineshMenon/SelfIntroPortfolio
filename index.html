<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ARJUN — Cinematic Developer Portfolio</title>
    <meta name="description" content="Arjun's cinematic developer portfolio. Full-stack developer, AI enthusiast, and computer science student building in the void.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400&family=Playfair+Display:wght@600;700;800;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: #ffb5a0 #131313;
        }

        html::-webkit-scrollbar {
            width: 6px;
        }

        html::-webkit-scrollbar-track {
            background: #131313;
        }

        html::-webkit-scrollbar-thumb {
            background: #ffb5a0;
            border-radius: 3px;
        }

        body {
            background-color: #080808;
            color: #e5e2e1;
            font-family: 'Hanken Grotesk', sans-serif;
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            background-color: #ffb5a0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease, border 0.3s ease;
            mix-blend-mode: difference;
        }

        #custom-cursor.hovering {
            width: 48px;
            height: 48px;
            background-color: transparent;
            border: 1px solid #ffb5a0;
            mix-blend-mode: normal;
        }

        /* Fixed Navigation */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10000;
            background: rgba(8, 8, 8, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(93, 64, 56, 0.15);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-bar.hidden {
            transform: translateY(-100%);
        }

        .nav-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 64px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: #ffb5a0;
            text-decoration: none;
            letter-spacing: -0.03em;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(231, 189, 178, 0.7);
            text-decoration: none;
            transition: color 0.3s ease;
            padding: 4px 0;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #ffb5a0;
        }

        .nav-links a.active {
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 181, 160, 0.4);
        }

        .nav-cta {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #ffb5a0;
            text-decoration: none;
            border: 1px solid #ffb5a0;
            padding: 10px 24px;
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: #ffb5a0;
            color: #080808;
        }

        /* Section iframes */
        .section-frame {
            width: 100%;
            border: none;
            display: block;
            overflow: hidden;
            min-height: 100vh;
        }

        /* Section divider */
        .section-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 181, 160, 0.15), transparent);
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #080808;
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            color: #ffb5a0;
            letter-spacing: -0.03em;
        }

        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 181, 160, 0.1);
            border-radius: 1px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: #ffb5a0;
            border-radius: 1px;
            transition: width 0.3s ease;
        }

        /* Mobile nav */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #ffb5a0;
            cursor: none;
        }

        @media (max-width: 768px) {
            .nav-inner {
                padding: 0 20px;
            }

            .nav-links {
                display: none;
            }

            .nav-cta {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-text">ARJUN</div>
        <div class="loading-bar">
            <div class="loading-bar-fill" id="loading-bar-fill"></div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div id="custom-cursor"></div>

    <!-- Fixed Navigation -->
    <nav class="nav-bar" id="navbar">
        <div class="nav-inner">
            <a href="#hero" class="nav-brand interactive-element">ARJUN</a>
            <ul class="nav-links">
                <li><a href="#hero" class="interactive-element active" data-section="hero">About</a></li>
                <li><a href="#skills" class="interactive-element" data-section="skills">Skills</a></li>
                <li><a href="#projects" class="interactive-element" data-section="projects">Projects</a></li>
                <li><a href="#journey" class="interactive-element" data-section="journey">Journey</a></li>
                <li><a href="#about" class="interactive-element" data-section="about">Behind</a></li>
                <li><a href="#contact" class="interactive-element" data-section="contact">Contact</a></li>
            </ul>
            <a href="#contact" class="nav-cta interactive-element">Let's Talk</a>
            <button class="mobile-menu-btn interactive-element" aria-label="Menu">
                <span class="material-symbols-outlined" style="font-size: 28px;">menu</span>
            </button>
        </div>
    </nav>

    <!-- Page Sections -->
    <div id="hero" style="scroll-margin-top: 72px;">
        <iframe src="screens/hero-centered.html" class="section-frame" id="frame-hero" title="Hero Section"></iframe>
    </div>

    <div class="section-divider"></div>

    <div id="skills" style="scroll-margin-top: 72px;">
        <iframe src="screens/the-craft.html" class="section-frame" id="frame-skills" title="Skills Section"></iframe>
    </div>

    <div class="section-divider"></div>

    <div id="projects" style="scroll-margin-top: 72px;">
        <iframe src="screens/creations.html" class="section-frame" id="frame-projects" title="Projects Section"></iframe>
    </div>

    <div class="section-divider"></div>

    <div id="journey" style="scroll-margin-top: 72px;">
        <iframe src="screens/the-path.html" class="section-frame" id="frame-journey" title="Journey Section"></iframe>
    </div>

    <div class="section-divider"></div>

    <div id="about" style="scroll-margin-top: 72px;">
        <iframe src="screens/behind-the-code.html" class="section-frame" id="frame-about" title="About Section"></iframe>
    </div>

    <div class="section-divider"></div>

    <div id="contact" style="scroll-margin-top: 72px;">
        <iframe src="screens/the-connection.html" class="section-frame" id="frame-contact" title="Contact Section"></iframe>
    </div>

    <script>
        // ============================================================
        // AUTO-RESIZE IFRAMES TO FIT CONTENT
        // ============================================================
        function resizeIframe(iframe) {
            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                if (doc && doc.body) {
                    const height = Math.max(
                        doc.body.scrollHeight,
                        doc.documentElement.scrollHeight,
                        doc.body.offsetHeight,
                        doc.documentElement.offsetHeight
                    );
                    iframe.style.height = height + 'px';
                    iframe.style.minHeight = '0';
                }
            } catch (e) {
                // Cross-origin fallback — keep min-height
            }
        }

        const iframes = document.querySelectorAll('.section-frame');
        let loadedCount = 0;
        const totalFrames = iframes.length;
        const loadingBar = document.getElementById('loading-bar-fill');
        const loadingOverlay = document.getElementById('loading-overlay');

        iframes.forEach(iframe => {
            iframe.addEventListener('load', () => {
                resizeIframe(iframe);
                loadedCount++;
                const pct = Math.round((loadedCount / totalFrames) * 100);
                loadingBar.style.width = pct + '%';

                if (loadedCount >= totalFrames) {
                    setTimeout(() => {
                        loadingOverlay.classList.add('fade-out');
                        setTimeout(() => loadingOverlay.remove(), 800);
                    }, 400);
                }

                // Re-check sizing after images load inside iframe
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    const imgs = iframeDoc.querySelectorAll('img');
                    imgs.forEach(img => {
                        if (!img.complete) {
                            img.addEventListener('load', () => resizeIframe(iframe));
                        }
                    });
                } catch(e) {}
            });
        });

        // Periodic resize check for dynamic content (Three.js, etc.)
        setInterval(() => {
            iframes.forEach(resizeIframe);
        }, 2000);

        window.addEventListener('resize', () => {
            iframes.forEach(resizeIframe);
        });

        // ============================================================
        // CUSTOM CURSOR
        // ============================================================
        const cursor = document.getElementById('custom-cursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('.interactive-element, a, button')) {
                cursor.classList.add('hovering');
            }
        });

        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('.interactive-element, a, button')) {
                cursor.classList.remove('hovering');
            }
        });

        // ============================================================
        // ACTIVE NAV LINK ON SCROLL
        // ============================================================
        const sections = document.querySelectorAll('[id]');
        const navLinks = document.querySelectorAll('.nav-links a[data-section]');

        const navObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    navLinks.forEach(link => {
                        link.classList.toggle('active', link.dataset.section === id);
                    });
                }
            });
        }, {
            rootMargin: '-40% 0px -60% 0px',
            threshold: 0
        });

        sections.forEach(section => {
            if (section.querySelector('.section-frame')) {
                navObserver.observe(section);
            }
        });

        // ============================================================
        // HIDE/SHOW NAV ON SCROLL
        // ============================================================
        let lastScrollY = 0;
        const navbar = document.getElementById('navbar');

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            if (currentScrollY > lastScrollY && currentScrollY > 200) {
                navbar.classList.add('hidden');
            } else {
                navbar.classList.remove('hidden');
            }
            lastScrollY = currentScrollY;
        }, { passive: true });

        // ============================================================
        // SMOOTH SCROLL FOR NAV LINKS
        // ============================================================
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>
</body>
</html>
