<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_1 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_1" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_1');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Mountain Silhouettes
const mountainGroup = new THREE.Group();
const mtl = new THREE.MeshBasicMaterial({ color: 0x050505 });

const createMountain = (x, y, z, scale) => {
    const geo = new THREE.ConeGeometry(2, 4, 4);
    const mesh = new THREE.Mesh(geo, mtl);
    mesh.position.set(x, y, z);
    mesh.scale.set(scale, scale, scale);
    mesh.rotation.y = Math.PI / 4;
    return mesh;
};

mountainGroup.add(createMountain(-4, -1, -2, 2.5));
mountainGroup.add(createMountain(2, -1.5, -3, 3.5));
mountainGroup.add(createMountain(6, -1, -1, 2));
scene.add(mountainGroup);

// Floating Particles
const particlesCount = 200;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 15;
}

const particlesGeo = new THREE.BufferGeometry();
particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const particlesMat = new THREE.PointsMaterial({
    size: 0.02,
    color: 0xFFA500,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particlesGeo, particlesMat);
scene.add(particles);

// Mouse Interaction
let mouseX = 0;
let mouseY = 0;
window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 0.5;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 0.5;
});

const animate = () => {
    requestAnimationFrame(animate);
    
    mountainGroup.position.x += (mouseX - mountainGroup.position.x) * 0.05;
    mountainGroup.position.y += (-mouseY - mountainGroup.position.y) * 0.05;
    
    particles.rotation.y += 0.001;
    particles.position.x += (mouseX - particles.position.x) * 0.1;
    
    renderer.render(scene, camera);
};

animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_1 -->
</body>
</html>
