<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_17 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_17" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_17');
  const devicePixelRatio = window.devicePixelRatio || 1;
  // Three.js Skill Constellation Scene
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 100;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Skill Data
const skillGroups = [
  { name: 'Languages', skills: ['Python', 'Java', 'C', 'JavaScript', 'TypeScript'], color: 0xff4500, pos: new THREE.Vector3(-40, 20, 0) },
  { name: 'Frontend', skills: ['HTML', 'CSS', 'React', 'Next.js'], color: 0xff4500, pos: new THREE.Vector3(40, 25, 0) },
  { name: 'Backend', skills: ['Node.js', 'Express', 'REST APIs'], color: 0xff4500, pos: new THREE.Vector3(-30, -20, 0) },
  { name: 'Database', skills: ['MySQL', 'MongoDB', 'PostgreSQL'], color: 0xff4500, pos: new THREE.Vector3(30, -15, 0) },
  { name: 'Cloud & DevOps', skills: ['AWS', 'Docker', 'Git', 'Linux'], color: 0xff4500, pos: new THREE.Vector3(0, 40, 0) },
  { name: 'AI', skills: ['Machine Learning', 'LLMs', 'Prompt Engineering'], color: 0xff4500, pos: new THREE.Vector3(0, -40, 0) }
];

const nodes = [];
const lines = [];
const particleGroup = new THREE.Group();
scene.add(particleGroup);

const nodeGeometry = new THREE.SphereGeometry(1.2, 16, 16);
const lineMaterial = new THREE.LineBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.3 });

// Create Constellation
skillGroups.forEach((group, gIdx) => {
  // Group central node
  const groupMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const groupNode = new THREE.Mesh(nodeGeometry, groupMaterial);
  groupNode.position.copy(group.pos);
  particleGroup.add(groupNode);
  nodes.push(groupNode);

  group.skills.forEach((skill, sIdx) => {
    const skillMaterial = new THREE.MeshBasicMaterial({ color: 0xff4500 });
    const skillNode = new THREE.Mesh(nodeGeometry, skillMaterial);
    
    // Position skill nodes around group center
    const angle = (sIdx / group.skills.length) * Math.PI * 2;
    const radius = 15;
    skillNode.position.set(
      group.pos.x + Math.cos(angle) * radius,
      group.pos.y + Math.sin(angle) * radius,
      group.pos.z + (Math.random() - 0.5) * 10
    );
    
    particleGroup.add(skillNode);
    nodes.push(skillNode);

    // Connection line
    const points = [group.pos, skillNode.position];
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geometry, lineMaterial);
    particleGroup.add(line);
  });
});

// Ambient Particles
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 400;
const posArray = new Float32Array(starsCount * 3);
for(let i=0; i < starsCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 300;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const starsMaterial = new THREE.PointsMaterial({ size: 0.5, color: 0xffffff, transparent: true, opacity: 0.5 });
const starField = new THREE.Points(starsGeometry, starsMaterial);
scene.add(starField);

// Animation
function animate() {
  requestAnimationFrame(animate);
  particleGroup.rotation.y += 0.002;
  particleGroup.rotation.x += 0.001;
  starField.rotation.y -= 0.0005;
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_17 -->
</body>
</html>
